<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Reacture Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      padding: 36px 24px 24px;
      overflow-y: auto;
    }

    .logo { width: 48px; height: 48px; margin-bottom: 4px; }
    .app-name {
      font-size: 28px;
      font-weight: bold;
      background: linear-gradient(to right, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }
    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      margin-bottom: 24px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      text-align: center;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
      background: linear-gradient(to right, #2563eb, #7c3aed);
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-danger {
      background: linear-gradient(to right, #dc2626, #b91c1c);
    }

    /* プライマリボタン行（QR / オーバーレイ） */
    .primary-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .primary-row .btn { flex: 1; padding: 10px; font-size: 13px; }

    .btn-primary-icon {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(to right, #2563eb, #7c3aed);
    }
    .btn-primary-icon:hover { opacity: 0.85; }
    .btn-primary-icon svg { width: 15px; height: 15px; flex-shrink: 0; }

    .btn-overlay {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-overlay.active { background: linear-gradient(135deg, #059669, #0d9488); }
    .btn-overlay.inactive { background: rgba(255, 255, 255, 0.08); color: rgba(255,255,255,0.5); }
    .btn-overlay:hover { opacity: 0.85; }
    .overlay-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .overlay-dot.on { background: #6ee7b7; box-shadow: 0 0 6px #34d399; }
    .overlay-dot.off { background: rgba(255,255,255,0.25); }

    /* セカンダリボタン行（Q&A / アンケート / カスタムリアクション） */
    .secondary-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .btn-secondary {
      flex: 1;
      position: relative;
      padding: 9px 4px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: transparent;
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    .badge {
      position: absolute;
      top: -6px;
      right: -4px;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      background: #3b82f6;
      font-size: 10px;
      font-weight: bold;
      line-height: 18px;
      text-align: center;
      padding: 0 5px;
      color: #fff;
    }

    .room-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 4px;
    }
    .room-id {
      font-size: 32px;
      font-family: monospace;
      font-weight: bold;
      letter-spacing: 0.3em;
      min-height: 40px;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .room-id.empty {
      -webkit-text-fill-color: rgba(255,255,255,0.1);
      background: none;
    }

    /* ボリューム */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .volume-icon {
      cursor: pointer;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.7);
    }
    .volume-icon:hover { color: #fff; }
    .volume-icon svg { width: 16px; height: 16px; }
    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #a78bfa;
      cursor: pointer;
    }

    /* モーダル共通 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 28px;
      width: 420px;
      max-width: 90%;
      text-align: center;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .modal-close-btn {
      margin-top: 12px;
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      cursor: pointer;
    }
    .modal-close-btn:hover { background: rgba(255,255,255,0.18); }

    /* アンケートフォーム（モーダル内） */
    .poll-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      resize: none;
    }
    .poll-input:focus { border-color: #a78bfa; }
    .poll-input::placeholder { color: rgba(255,255,255,0.25); }
    .poll-options { margin-bottom: 8px; }
    .poll-option-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .poll-option-row input { flex: 1; }
    .poll-remove-btn {
      background: none;
      border: none;
      color: #f87171;
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
    }
    .poll-actions {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }
    .poll-add-btn {
      background: none;
      border: none;
      color: #60a5fa;
      font-size: 12px;
      cursor: pointer;
    }
    .poll-btn-row { display: flex; gap: 8px; }
    .poll-cancel-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      cursor: pointer;
      padding: 6px 10px;
    }
    .poll-submit-btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
    }

    /* カスタムリアクション（モーダル内） */
    .custom-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .custom-emoji-input {
      width: 48px;
      text-align: center;
      font-size: 20px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
    }
    .custom-label-input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .custom-label-input::placeholder, .custom-emoji-input::placeholder {
      color: rgba(255,255,255,0.25);
    }
    .custom-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .custom-set-btn {
      flex: 1;
      background: #7c3aed;
      border: none;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
    }
    .custom-remove-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .status {
      margin-top: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      min-height: 16px;
      text-align: center;
    }
    .status.error { color: #f87171; }
    .status.success { color: #34d399; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <input type="hidden" id="serverUrl" value="https://reacture-server.onrender.com" />

  <img src="logo.png" class="logo" alt="Reacture" />
  <div class="app-name">Reacture Desktop</div>
  <p class="subtitle">授業をもっとインタラクティブに</p>

  <!-- メインカード -->
  <div class="card">
    <button class="btn" id="createBtn">ルームを作成</button>

    <div class="room-label" style="margin-top: 16px;">ルームコード</div>
    <div class="room-id empty" id="createdRoomId">----</div>

    <!-- QR / オーバーレイ（プライマリ） -->
    <div class="primary-row hidden" id="controlsRow">
      <button class="btn-primary-icon" id="qrBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 11h2v2H3v-2zm0-4h2v2H3V7zm4 4h2v2H7v-2zm0-4h2v2H7V7zm-4 8h2v2H3v-2zm8-8h2v2h-2V7zm-4 8h2v2H7v-2zM3 3v4h4V3H3zm2 2h-2V5h2v2zm8-2v4h4V3h-4zm2 2h2V5h-2v2zM3 13v4h4v-4H3zm2 2H5v-2h2v2zm8 0h2v2h-2v-2zm0-4h2v2h-2v-2zm4 4h2v2h-2v-2zm0-4h2v2h-2v-2zm-4 8h2v2h-2v-2zm4 0h2v2h-2v-2zm0-8h2v2h-2V7z"/></svg>
        QR
      </button>
      <button class="btn-overlay active" id="overlayToggleBtn">
        <span class="overlay-dot on" id="overlayDot"></span>
        オーバーレイ ON
      </button>
    </div>
    <!-- Q&A / アンケート / カスタムリアクション（セカンダリ） -->
    <div class="secondary-row hidden" id="toolsRow">
      <button class="btn-secondary" id="qaOpenBtn">Q&A<span class="badge hidden" id="qaBadge"></span></button>
      <button class="btn-secondary" id="pollOpenBtn">アンケート</button>
      <button class="btn-secondary" id="customOpenBtn">リアクション</button>
    </div>
    <!-- ボリューム -->
    <div class="volume-row hidden" id="volumeRow">
      <span class="volume-icon" id="volumeIcon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></span>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.5" />
    </div>
  </div>

  <p class="status" id="status"></p>

  <!-- アンケート作成モーダル -->
  <div class="modal-overlay" id="pollModal">
    <div class="modal-box">
      <div id="pollFormView">
        <div class="modal-title">アンケートを作成</div>
        <textarea class="poll-input" id="pollQuestion" rows="2" placeholder="質問を入力..."></textarea>
        <div class="poll-options" id="pollOptions">
          <div class="poll-option-row"><input class="poll-input" placeholder="選択肢 1" /></div>
          <div class="poll-option-row"><input class="poll-input" placeholder="選択肢 2" /></div>
        </div>
        <div class="poll-actions">
          <button class="poll-add-btn" id="pollAddBtn">+ 選択肢を追加</button>
          <div class="poll-btn-row">
            <button class="poll-cancel-btn" id="pollCancelBtn">キャンセル</button>
            <button class="poll-submit-btn" id="pollSubmitBtn">開始</button>
          </div>
        </div>
      </div>
      <div id="pollActiveView" class="hidden">
        <div class="poll-active-info" style="padding: 14px; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.7);">
          <span id="pollActiveQuestion"></span>
          <br />
          <button class="poll-end-btn" id="pollEndBtn" style="background: rgba(239,68,68,0.6); border: none; color: #fff; font-size: 12px; font-weight: bold; border-radius: 8px; padding: 6px 14px; cursor: pointer; margin-top: 8px;">投票を終了</button>
        </div>
        <button class="modal-close-btn" id="pollActiveCloseBtn">閉じる</button>
      </div>
    </div>
  </div>

  <!-- カスタムリアクションモーダル -->
  <div class="modal-overlay" id="customModal">
    <div class="modal-box">
      <div class="modal-title">カスタムリアクション</div>
      <div class="custom-row">
        <input class="custom-emoji-input" id="customEmoji" placeholder="😎" maxlength="2" />
        <input class="custom-label-input" id="customLabel" placeholder="ラベル（例: すごい）" />
      </div>
      <div class="custom-actions">
        <button class="custom-set-btn" id="customSetBtn">設定</button>
        <button class="custom-remove-btn hidden" id="customRemoveBtn">解除</button>
      </div>
      <button class="modal-close-btn" id="customCloseBtn">閉じる</button>
    </div>
  </div>

  <script src="setup.js"></script>
</body>
</html>
