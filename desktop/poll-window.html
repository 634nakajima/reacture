<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>アンケート - Reacture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
    }
    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .badge.voting {
      background: rgba(96, 165, 250, 0.2);
      color: #60a5fa;
    }
    .badge.ended {
      background: rgba(52, 211, 153, 0.2);
      color: #34d399;
    }
    .question {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.4;
    }
    .options {
      width: 100%;
      max-width: 500px;
    }
    .option {
      margin-bottom: 16px;
    }
    .option-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .option-text {
      font-size: 18px;
      font-weight: 500;
    }
    .option-votes {
      font-size: 16px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }
    .option-bar-bg {
      width: 100%;
      height: 32px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
    }
    .option-bar {
      height: 100%;
      border-radius: 8px;
      transition: width 0.5s ease;
      min-width: 0;
    }
    .option:nth-child(1) .option-bar { background: linear-gradient(to right, #3b82f6, #60a5fa); }
    .option:nth-child(2) .option-bar { background: linear-gradient(to right, #8b5cf6, #a78bfa); }
    .option:nth-child(3) .option-bar { background: linear-gradient(to right, #ec4899, #f472b6); }
    .option:nth-child(4) .option-bar { background: linear-gradient(to right, #f59e0b, #fbbf24); }
    .option:nth-child(5) .option-bar { background: linear-gradient(to right, #10b981, #34d399); }
    .option:nth-child(6) .option-bar { background: linear-gradient(to right, #ef4444, #f87171); }
    .total-votes {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.4);
    }
    .end-btn {
      margin-top: 24px;
      padding: 12px 32px;
      border-radius: 10px;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(239, 68, 68, 0.7);
      transition: opacity 0.2s;
    }
    .end-btn:hover { opacity: 0.85; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="badge voting" id="badge">投票受付中</div>
  <div class="question" id="question"></div>
  <div class="options" id="options"></div>
  <div class="total-votes" id="totalVotes"></div>
  <button class="end-btn" id="endBtn">投票を終了</button>

  <script>
    const badgeEl = document.getElementById('badge');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const totalVotesEl = document.getElementById('totalVotes');
    const endBtn = document.getElementById('endBtn');

    let currentPollId = null;

    function renderPoll(data, showResults) {
      questionEl.textContent = data.question;
      const totalVotes = data.options.reduce((sum, o) => sum + o.votes, 0);

      optionsEl.innerHTML = '';
      data.options.forEach((opt) => {
        const pct = totalVotes > 0 ? Math.round((opt.votes / totalVotes) * 100) : 0;
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `
          <div class="option-header">
            <span class="option-text">${escapeHtml(opt.text)}</span>
            ${showResults ? `<span class="option-votes">${opt.votes}票 (${pct}%)</span>` : ''}
          </div>
          ${showResults ? `
          <div class="option-bar-bg">
            <div class="option-bar" style="width: ${pct}%"></div>
          </div>` : ''}
        `;
        optionsEl.appendChild(div);
      });

      if (showResults) {
        totalVotesEl.textContent = `合計 ${totalVotes} 票`;
      } else {
        totalVotesEl.textContent = '';
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // アンケート開始
    window.electronAPI.onPollStarted((data) => {
      currentPollId = data.id;
      badgeEl.textContent = '投票受付中';
      badgeEl.className = 'badge voting';
      endBtn.classList.remove('hidden');
      renderPoll(data, false);
    });

    // アンケート更新（投票が入った）
    window.electronAPI.onPollUpdated((data) => {
      renderPoll(data, false);
    });

    // アンケート終了 → 結果表示
    window.electronAPI.onPollEnded((data) => {
      currentPollId = null;
      badgeEl.textContent = '結果';
      badgeEl.className = 'badge ended';
      endBtn.classList.add('hidden');
      renderPoll(data, true);
    });

    endBtn.addEventListener('click', () => {
      if (currentPollId) {
        window.electronAPI.sendPollEnd(currentPollId);
      }
    });
  </script>
</body>
</html>
